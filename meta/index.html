<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>Meta Analysis</title>
    <link rel="stylesheet" href="../style.css">
    <script type="module" src="../global.js"></script>

</head>
<body>
    <body class="meta-page"></body>
    <h1>Meta </h1>
    <p>This page will show statistics about this website's code.</p>

    <div id="stats"></div>
    

    <h2>Commits by time of day</h2>

    <div class="slider-container">
        <label for="commit-progress">
            Show commits until:
            <input id="commit-progress" type="range" min="0" max="100" value="100">
        </label>
        <time id="commit-time-filter"></time>
    </div>

    <div id="scrolly-1">
        <div id="scatter-story"></div>

        <div id="scatter-plot">
            <div id="chart"></div>

            <p id="selection-count">No commits selected</p>
            <dl id="language-breakdown" class="stats"></dl>
        </div>
    </div>

    <h2>Files by size</h2>
    <dl id="files"></dl>
    
    <dl id="commit-tooltip" class="info tooltip" hidden>
        <dt>Commit</dt>
        <dd>
            <a href="" id="commit-link" target="_blank"></a>
        </dd>

        <dt>Date</dt>
        <dd id="commit-date"></dd>

        <dt>Time</dt>
        <dd id="commit-tooltip-time"></dd>

        <dt>Author</dt>
        <dd id="commit-author"></dd>

        <dt>Lines edited</dt>
        <dd id="commit-lines"></dd>
    </dl>

    <script type="module" src="main.js"></script>

</body>
</html>
